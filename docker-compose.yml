version: '3.8'

# ============================================================
# ABCare OmniFlow — Full Stack Docker Compose
# ============================================================
# QUICK START (Linux/Mac):
#   cp .env.example .env        # fill in your secrets
#   docker compose up -d        # start everything
#   open http://localhost:3000
#
# QUICK START (Windows PowerShell):
#   Copy-Item .env.example .env  # fill in your secrets
#   docker compose up -d
#   start http://localhost:3000
# ============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: abccare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Single complete schema — runs automatically on first start
      - ./database/full_schema.sql:/docker-entrypoint-initdb.d/01-full_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (Local AI) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: abccare-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 8 && ollama pull llama3.2 && ollama pull llava && wait"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  # ── ABCare Web Application ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abccare-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      OLLAMA_HOST: http://ollama:11434
      DEFAULT_MODEL: ${DEFAULT_MODEL:-llama3.2}
      VISION_MODEL: ${VISION_MODEL:-llava}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/api/auth/google/callback}
      GOOGLE_ALLOWED_EMAILS: ${GOOGLE_ALLOWED_EMAILS:-}
      SMS_API_URL: ${SMS_API_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER_NAME: ${SMS_SENDER_NAME:-ABCClinic}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  uploads_data:
    driver: local

networks:
  default:
    name: abccare-network
